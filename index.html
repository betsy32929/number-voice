<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1到50數字發音練習</title>
<style>
:root{
  --bg:#f7f5f1;
  --card:#ffffff;
  --text:#243047;
  --pri:#ff9f43;
  --pri2:#ff6b6b;
  --line:#eadfd2;
  --green:#28a745;
  --greenSoft:#eafff1;
  --red:#e63946;
  --redSoft:#fff0f1;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
.header{
  background:linear-gradient(90deg,var(--pri),var(--pri2));
  color:white;
  padding:16px 14px;
  text-align:center;
  font-size:26px;
  font-weight:900;
}
.wrap{
  max-width:980px;
  margin:0 auto;
  padding:14px;
}
.card{
  background:var(--card);
  border-radius:20px;
  padding:14px;
  box-shadow:0 8px 24px rgba(36,48,71,.12);
}
.modeRow{
  display:flex;
  gap:10px;
  margin-bottom:12px;
}
.modeBtn{
  flex:1;
  border:none;
  border-radius:16px;
  padding:14px;
  font-size:20px;
  font-weight:1000;
  cursor:pointer;
  background:#fff;
  border:2px solid var(--line);
  color:#555;
}
.modeBtn.active.en{
  background:#ff9f43;
  color:#fff;
  border-color:#ff9f43;
}
.modeBtn.active.zh{
  background:#36b37e;
  color:#fff;
  border-color:#36b37e;
}
.ctrl{
  display:flex;
  gap:8px;
  align-items:center;
  justify-content:center;
  flex-wrap:wrap;
  margin-bottom:12px;
}
select,button.small{
  border:1px solid var(--line);
  border-radius:12px;
  background:white;
  padding:10px 12px;
  font-size:15px;
}
.parentModeBtn{
  width:100%;
  border:none;
  border-radius:18px;
  padding:16px;
  font-size:24px;
  font-weight:1000;
  cursor:pointer;
  margin-bottom:10px;
  background:#fff;
  border:3px solid #ff9f43;
  color:#c25b00;
  box-shadow:0 4px 12px rgba(36,48,71,.08);
}
.parentModeBtn.on{
  background:linear-gradient(90deg,#ff9f43,#ff6b6b);
  color:white;
  border-color:#ff8f2a;
}
.parentBar{
  display:none;
  gap:8px;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  background:#fff8ef;
  border:2px solid #ffd6a4;
  border-radius:16px;
  padding:10px;
  margin-bottom:12px;
}
body.parentMode .parentBar{
  display:flex;
}
.parentTitle{
  font-weight:1000;
  color:#c25b00;
  font-size:17px;
}
.counts{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  font-weight:900;
}
.countChip{
  background:white;
  border:1px solid var(--line);
  border-radius:999px;
  padding:7px 10px;
}
.goodText{color:var(--green)}
.badText{color:var(--red)}
.grid{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:9px;
}
.numBtn{
  width:100%;
  border:none;
  border-radius:16px;
  background:white;
  border:2px solid #ffe0bd;
  min-height:76px;
  cursor:pointer;
  box-shadow:0 4px 12px rgba(36,48,71,.08);
}
.numBtn:active{
  transform:scale(.96);
}
.numBtn.active{
  background:#fff3e6;
  border-color:#ff9f43;
  box-shadow:0 0 0 3px rgba(255,159,67,.18);
}
.numBtn .n{
  font-size:30px;
  font-weight:1000;
  color:#ff7f2a;
}
.numBtn .w{
  font-size:13px;
  font-weight:900;
  color:#596275;
  margin-top:2px;
}
.scoreBox{
  display:none;
  grid-template-columns:1fr 1fr;
  gap:4px;
  margin-top:5px;
}
body.parentMode .scoreBox{
  display:grid;
}
.scoreBtn{
  height:36px;
  border-radius:999px;
  border:2px solid #e5e1dc;
  background:#fff;
  font-size:18px;
  font-weight:1000;
  cursor:pointer;
}
.goodPick{
  color:var(--green);
  border-color:#bde8c8;
  background:var(--greenSoft);
}
.badPick{
  color:var(--red);
  border-color:#ffc5ca;
  background:var(--redSoft);
}
.scoreBtn.selected.goodPick{
  background:var(--green);
  border-color:var(--green);
  color:white;
  box-shadow:0 0 0 3px rgba(40,167,69,.22);
}
.scoreBtn.selected.badPick{
  background:var(--red);
  border-color:var(--red);
  color:white;
  box-shadow:0 0 0 3px rgba(230,57,70,.22);
}
.footer{
  text-align:center;
  color:#7b8497;
  font-size:13px;
  margin-top:12px;
}
@media(max-width:780px){
  .wrap{padding:8px}
  .header{font-size:22px}
  .grid{
    grid-template-columns:repeat(5,1fr);
    gap:8px;
  }
  .numBtn{min-height:72px}
  .numBtn .n{font-size:27px}
  .numBtn .w{font-size:12px}
  .modeBtn{font-size:18px}
  .parentModeBtn{font-size:21px}
}
</style>
</head>

<script>
var speakMode = "en";
var lastBtn = null;
var lastNum = null;
var STORAGE_KEY = "number_voice_score_1_50_v3";
var PARENT_MODE_KEY = "number_voice_parent_mode_v1";

function loadScores(){
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
  } catch(e) {
    return {};
  }
}

function saveScores(scores){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(scores));
}

function toggleParentMode(){
  var isOn = document.body.classList.toggle("parentMode");
  localStorage.setItem(PARENT_MODE_KEY, isOn ? "1" : "0");
  updateParentModeBtn();
}

function updateParentModeBtn(){
  var btn = document.getElementById("parentModeBtn");
  var isOn = document.body.classList.contains("parentMode");
  btn.classList.toggle("on", isOn);
  btn.innerText = isOn ? "👨‍👩‍👧 家長評分模式：開啟中" : "👨‍👩‍👧 家長評分模式：關閉";
}

function applyParentMode(){
  if(localStorage.getItem(PARENT_MODE_KEY) === "1"){
    document.body.classList.add("parentMode");
  }
  updateParentModeBtn();
}

function applyScores(){
  var scores = loadScores();
  var cards = document.querySelectorAll(".numCard");
  for(var i=0;i<cards.length;i++){
    var n = cards[i].getAttribute("data-num");
    var score = scores[n] || "";
    var good = cards[i].querySelector(".goodPick");
    var bad = cards[i].querySelector(".badPick");
    good.classList.toggle("selected", score === "good");
    bad.classList.toggle("selected", score === "bad");
  }
  updateCounts();
}

function setScore(btn,n,score){
  var scores = loadScores();
  var now = scores[n] || "";

  if(now === score){
    delete scores[n];
  }else{
    scores[n] = score;
  }

  saveScores(scores);
  applyScores();

  if(score === "bad" && scores[n] === "bad"){
    speakEncourage();
  }
}

function speakEncourage(){
  try {
    window.speechSynthesis.cancel();
    var msg = new SpeechSynthesisUtterance("析楓加油唷");
    msg.lang = "zh-TW";
    msg.rate = 0.9;
    msg.pitch = 1;
    window.speechSynthesis.speak(msg);
  } catch(e) {}
}

function updateCounts(){
  var scores = loadScores();
  var good = 0;
  var bad = 0;
  Object.keys(scores).forEach(function(k){
    if(scores[k] === "good") good++;
    if(scores[k] === "bad") bad++;
  });
  document.getElementById("goodCount").innerText = good;
  document.getElementById("badCount").innerText = bad;
}

function clearScores(){
  if(confirm("確定要清除全部評分嗎？")){
    localStorage.removeItem(STORAGE_KEY);
    applyScores();
  }
}

function setMode(mode){
  speakMode = mode;
  document.getElementById("enBtn").classList.toggle("active", mode === "en");
  document.getElementById("zhBtn").classList.toggle("active", mode === "zh");

  if(lastBtn && lastNum){
    speakNumber(lastBtn, lastNum);
  }
}

function speakNumber(btn,n){
  var en = btn.getAttribute("data-en");
  var zh = btn.getAttribute("data-zh");
  var text = speakMode === "en" ? en : zh;
  var lang = speakMode === "en" ? "en-US" : "zh-TW";

  lastBtn = btn;
  lastNum = n;

  var all = document.querySelectorAll(".numBtn");
  for(var i=0;i<all.length;i++){
    all[i].classList.remove("active");
  }
  btn.classList.add("active");

  try {
    window.speechSynthesis.cancel();
    var msg = new SpeechSynthesisUtterance(text);
    msg.lang = lang;
    msg.rate = parseFloat(document.getElementById("rate").value || "0.9");
    msg.pitch = 1;
    window.speechSynthesis.speak(msg);
  } catch(e) {
    alert("這個瀏覽器不支援語音朗讀，請用 Safari 或 Chrome 開啟。");
  }
}

function stopSpeak(){
  try {
    window.speechSynthesis.cancel();
  } catch(e) {}
}

applyParentMode();
applyScores();
</script>

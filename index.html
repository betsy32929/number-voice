:root{

  --pri2:#ff6b6b;
  --soft:#fff3e6;
  --line:#eadfd2;

}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
.header{
  background:linear-gradient(90deg,var(--pri),var(--pri2));
  color:white;
  padding:18px 14px;
  text-align:center;
  font-size:26px;
  font-weight:900;
}
.wrap{
  max-width:980px;
  margin:0 auto;
  padding:16px;
}
.card{
  background:var(--card);
  border-radius:20px;
  padding:16px;
  box-shadow:0 8px 24px rgba(36,48,71,.12);
}
.result{
  background:var(--soft);
  border:3px solid #ffd6a4;
  border-radius:18px;
  padding:14px;
  text-align:center;
  margin-bottom:14px;
}
.numShow{
  font-size:34px;
  font-weight:1000;
  color:#ff7f2a;
}
.wordShow{
  font-size:30px;
  font-weight:1000;
  color:#d35400;
  margin-top:4px;
}
.zhShow{
  font-size:26px;
  font-weight:900;
  color:#2f6f55;
  margin-top:2px;
}
.modeRow{
  display:flex;
  gap:10px;
  margin-bottom:14px;
}
.modeBtn{
  flex:1;
  border:none;
  border-radius:16px;
  padding:14px;
  font-size:20px;
  font-weight:1000;
  cursor:pointer;
  background:#fff;
  border:2px solid var(--line);
  color:#555;
}
.modeBtn.active.en{
  background:#ff9f43;
  color:#fff;
  border-color:#ff9f43;
}
.modeBtn.active.zh{
  background:#36b37e;
  color:#fff;
  border-color:#36b37e;
}
.ctrl{
  display:flex;
  gap:8px;
  align-items:center;
  justify-content:center;
  flex-wrap:wrap;
  margin-bottom:14px;
}
select,button.small{
  border:1px solid var(--line);
  border-radius:12px;
  background:white;
  padding:10px 12px;
  font-size:15px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:9px;
}
.numBtn{
  border:none;
  border-radius:16px;
  background:white;
  border:2px solid #ffe0bd;
  min-height:88px;
  cursor:pointer;
  box-shadow:0 4px 12px rgba(36,48,71,.08);
}
.numBtn:active{
  transform:scale(.96);
}
.numBtn.active{
  background:#fff3e6;
  border-color:#ff9f43;
  box-shadow:0 0 0 3px rgba(255,159,67,.18);
}
.numBtn .n{
  font-size:30px;
  font-weight:1000;
  color:#ff7f2a;
}
.numBtn .w{
  font-size:13px;
  font-weight:900;
  color:#596275;
  margin-top:2px;
}
.numBtn .z{
  font-size:14px;
  font-weight:900;
  color:#36b37e;
  margin-top:2px;
}
.footer{
  text-align:center;
  color:#7b8497;
  font-size:13px;
  margin-top:12px;
}
@media(max-width:780px){
  .wrap{padding:10px}
  .header{font-size:22px}
  .grid{
    grid-template-columns:repeat(5,1fr);
    gap:8px;
  }
  .numBtn{min-height:86px}

  .numBtn .w{font-size:12px}
  .numBtn .z{font-size:13px}
  .wordShow{font-size:25px}
  .zhShow{font-size:23px}
  .modeBtn{font-size:18px}

</style>
</head>

<script>
var speakMode = "en";
var lastBtn = null;
var lastNum = null;

function setMode(mode){
  speakMode = mode;
  document.getElementById("enBtn").classList.toggle("active", mode === "en");
  document.getElementById("zhBtn").classList.toggle("active", mode === "zh");

  if(lastBtn && lastNum){
    speakNumber(lastBtn, lastNum);
  }
}

function speakNumber(btn,n){
  var en = btn.getAttribute("data-en");
  var zh = btn.getAttribute("data-zh");
  var text = speakMode === "en" ? en : zh;
  var lang = speakMode === "en" ? "en-US" : "zh-TW";

  lastBtn = btn;
  lastNum = n;

  document.getElementById("numShow").innerText = n;
  document.getElementById("wordShow").innerText = en;
  document.getElementById("zhShow").innerText = zh;

  var all = document.querySelectorAll(".numBtn");
  for(var i=0;i<all.length;i++){
    all[i].classList.remove("active");
  }
  btn.classList.add("active");

  try {
    window.speechSynthesis.cancel();
    var msg = new SpeechSynthesisUtterance(text);
    msg.lang = lang;
    msg.rate = parseFloat(document.getElementById("rate").value || "0.9");
    msg.pitch = 1;
    window.speechSynthesis.speak(msg);
  } catch(e) {
    alert("這個瀏覽器不支援語音朗讀，請用 Safari 或 Chrome 開啟。");
  }
}

function stopSpeak(){
  try {
    window.speechSynthesis.cancel();
  } catch(e) {}
}
</script>
